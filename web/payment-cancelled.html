<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — Quietly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      text-align: center;
    }

    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2A2D3A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #94A3B8;
      margin-bottom: 24px;
      line-height: 1;
    }

    h1 {
      color: #F1F5F9;
      font-size: 22px;
      font-weight: 700;
    }

    .subtext {
      color: #94A3B8;
      font-size: 15px;
      margin-top: 8px;
      line-height: 1.5;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="icon-circle">✕</div>
  <h1>Payment Cancelled</h1>
  <p class="subtext">No charge was made. You can return to the app anytime.</p>
</body>
</html>
