<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Quietly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      text-align: center;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      margin-bottom: 24px;
      line-height: 1;
    }

    h1 {
      color: #F1F5F9;
      font-size: 22px;
      font-weight: 700;
    }

    .subtext {
      color: #94A3B8;
      font-size: 15px;
      margin-top: 8px;
      line-height: 1.5;
      max-width: 300px;
    }

    .note {
      color: #94A3B8;
      font-size: 12px;
      margin-top: 40px;
      max-width: 280px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="checkmark">✓</div>
  <h1>Payment Successful</h1>
  <p class="subtext">Welcome to Quietly Premium. You can now return to the app.</p>
  <p class="note">This page will not redirect automatically. Please return to the Quietly app.</p>
</body>
</html>
